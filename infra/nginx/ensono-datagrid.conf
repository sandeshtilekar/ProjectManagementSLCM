# ============================================================
#  Ensono DataGrid — Nginx Production Config
#  File: /etc/nginx/sites-available/ensono-datagrid
#  Built by Sandesh Tilekar — Ensono India Operations
# ============================================================

# ── Upstream: Node.js cluster (round-robin across all workers)
upstream ensono_api {
    least_conn;                          # route to least-busy worker
    server 127.0.0.1:4000 max_fails=3 fail_timeout=30s;
    keepalive 64;                        # keep upstream connections alive
}

# ── Rate limiting zones ──────────────────────────────────────
limit_req_zone  $binary_remote_addr zone=api_limit:10m  rate=30r/s;
limit_req_zone  $binary_remote_addr zone=auth_limit:10m rate=5r/m;
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# ── HTTP → HTTPS redirect ────────────────────────────────────
server {
    listen      80;
    listen      [::]:80;
    server_name datagrid.ensono.com;

    # Allow Let's Encrypt ACME challenges through
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS main server ────────────────────────────────────────
server {
    listen      443 ssl http2;
    listen      [::]:443 ssl http2;
    server_name datagrid.ensono.com;

    # ── SSL / TLS ─────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/datagrid.ensono.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/datagrid.ensono.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/datagrid.ensono.com/chain.pem;

    ssl_session_cache   shared:SSL:20m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;

    # OCSP stapling — faster SSL handshake
    ssl_stapling        on;
    ssl_stapling_verify on;
    resolver            8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout    5s;

    # ── Security Headers ──────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options              SAMEORIGIN                       always;
    add_header X-Content-Type-Options       nosniff                          always;
    add_header X-XSS-Protection             "1; mode=block"                  always;
    add_header Referrer-Policy              "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy           "camera=(), microphone=(), geolocation=()" always;
    # [LOW-2] CSP managed by Helmet middleware — not set here to avoid dual-header conflict
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_buffers      16 8k;
    gzip_http_version 1.1;
    gzip_types
      text/plain text/css text/xml text/javascript
      application/json application/javascript application/xml
      application/rss+xml application/atom+xml
      image/svg+xml font/truetype font/opentype
      application/vnd.ms-fontobject;
    gzip_min_length   1024;

    # ── General settings ──────────────────────────────────
    client_max_body_size    30M;
    client_body_timeout     30s;
    client_header_timeout   15s;
    send_timeout            30s;
    keepalive_timeout       65;
    keepalive_requests      100;

    # Hide Nginx version
    server_tokens off;

    # Connection limit per IP
    limit_conn conn_limit 50;

    # ── Static file uploads (attachments) ─────────────────
    location /uploads/ {
        alias       /opt/ensono-datagrid/uploads/;
        expires     30d;
        add_header  Cache-Control "public, immutable";
        add_header  X-Content-Type-Options nosniff;

        # Only allow GET/HEAD for uploaded files
        limit_except GET HEAD {
            deny all;
        }

        # Image thumbnail check
        location ~* \.(jpg|jpeg|png|gif|webp)$ {
            add_header Vary Accept;
            expires 90d;
        }
    }

    # ── WebSocket — Socket.io real-time ───────────────────
    location /socket.io/ {
        proxy_pass             http://ensono_api;
        proxy_http_version     1.1;
        proxy_set_header       Upgrade    $http_upgrade;
        proxy_set_header       Connection "upgrade";
        proxy_set_header       Host       $host;
        proxy_set_header       X-Real-IP  $remote_addr;
        proxy_set_header       X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header       X-Forwarded-Proto $scheme;
        proxy_read_timeout     3600s;    # keep WS alive for 1 hour
        proxy_send_timeout     3600s;
        proxy_buffering        off;
        proxy_cache_bypass     $http_upgrade;
    }

    # ── Auth endpoints — tighter rate limit ───────────────
    location ~ ^/api/auth/(login|register) {
        limit_req zone=auth_limit burst=10 nodelay;
        proxy_pass          http://ensono_api;
        proxy_http_version  1.1;
        proxy_set_header    Connection "";
        proxy_set_header    Host               $host;
        proxy_set_header    X-Real-IP          $remote_addr;
        proxy_set_header    X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto  $scheme;
    }

    # ── API requests ──────────────────────────────────────
    location /api/ {
        limit_req zone=api_limit burst=50 nodelay;

        proxy_pass          http://ensono_api;
        proxy_http_version  1.1;
        proxy_set_header    Connection         "";
        proxy_set_header    Host               $host;
        proxy_set_header    X-Real-IP          $remote_addr;
        proxy_set_header    X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto  $scheme;

        proxy_connect_timeout   10s;
        proxy_send_timeout      30s;
        proxy_read_timeout      30s;

        # Buffering improves throughput for most API responses
        proxy_buffering      on;
        proxy_buffer_size    8k;
        proxy_buffers        16 8k;
    }

    # ── Health check — no rate limit, no logging ──────────
    location = /health {
        proxy_pass          http://ensono_api;
        proxy_http_version  1.1;
        proxy_set_header    Connection "";
        access_log          off;
    }

    # ── React SPA — all other routes ──────────────────────
    location / {
        proxy_pass          http://ensono_api;
        proxy_http_version  1.1;
        proxy_set_header    Connection         "";
        proxy_set_header    Host               $host;
        proxy_set_header    X-Real-IP          $remote_addr;
        proxy_set_header    X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto  $scheme;

        # Cache static assets aggressively
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            proxy_pass       http://ensono_api;
            expires          1y;
            add_header       Cache-Control "public, immutable";
            access_log       off;
        }
    }

    # ── Logging ───────────────────────────────────────────
    access_log /var/log/nginx/ensono-datagrid-access.log combined buffer=16k flush=5s;
    error_log  /var/log/nginx/ensono-datagrid-error.log  warn;

    # ── Block common exploit paths ────────────────────────
    location ~ /\. { deny all; access_log off; log_not_found off; }
    location ~ ~$   { deny all; access_log off; log_not_found off; }
    location ~* \.(env|git|sql|bak|sh|log)$ { deny all; }
}
